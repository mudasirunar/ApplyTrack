<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" sizes="32x32" href="/app_icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/app_icon.png" />
  <link rel="apple-touch-icon" href="/app_icon.png" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Synchronous Theme Initializer to prevent white flicker on load -->
  <script>
    (function() {
      const savedTheme = localStorage.getItem('applytrack_theme') || 'system';
      let themeToSet = savedTheme;
      if (savedTheme === 'system') {
        const isSystemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        themeToSet = isSystemDark ? 'dark' : 'light';
      }
      document.documentElement.setAttribute('data-theme', themeToSet);
      
      // Immediately set root background style to prevent any CSS-injection white flash
      const bgColor = themeToSet === 'dark' ? '#0E141C' : '#F7F8FA';
      document.documentElement.style.backgroundColor = bgColor;
      
      // Add no-transitions class to prevent initial load transition animations
      document.documentElement.classList.add('no-transitions');
    })();
  </script>

  <!-- SEO and Branding metadata -->
  <title>ApplyTrack | Career Application & Resume Tracker</title>
  <meta name="description"
    content="Track your job applications, custom resumes, interview progress, and conversion success analytics in one premium, secure dashboard with ApplyTrack." />
  <meta name="author" content="ApplyTrack Team" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>

</html>
